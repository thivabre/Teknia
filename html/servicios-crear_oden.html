    <div class="contenedor-padre">

        <div class="contenedor-tablas">
            <form class="form-insert">
            <h2>Crear orden de servicio</h2>
            <div class="campo-ingreso">
                <div class="campo">
                    <label>Nombre del articulo</label>
                    <input type="text" placeholder="Iphone 16 pro max">
                </div>
                <div class="campo">
                    <label>Tipo de articulo</label>
                    <input type="text" placeholder="Celular">
                </div>
                <div class="campo">
                    <label>Sucursal</label>
                    <select>
                    </select>
                </div>
                <div class="campo">
                    <label>Repuesto 1</label>
                    <select>
                        <option value="none">Ninguno</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Repuesto 2</label>
                    <select>
                        <option value="none">Ninguno</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Repuesto 3</label>
                    <select>
                        <option value="none">Ninguno</option>
                    </select>
                </div>
                <div class="campo">
                    <label>Fallas</label>
                    <textarea rows="5"></textarea>
                </div>
            </div>
            <button type="submit" class="envio-insert">Insertar</button>
        </form>
        </div>
    </div><!-- /contenedor-padre -->
    </div><!-- /contenedor-grid -->

    <div class="blurr"></div>
    <div class="contenedor-form-desactivado">
        <button class="cerrar">❌</button>
        <form class="form-insert">
            <h2>Insertar registro</h2>
            <div class="campo-ingreso"></div>
            <button type="submit" class="envio-insert">Insertar</button>
        </form>
    </div>

    <template id="molde-fila-pago">
        <tr>
            <td class="acciones">
                <button class="btn-editar">✏️</button>
                <button class="btn-eliminar">❌</button>
            </td>
        </tr>
    </template>
    <template id="molde-fila-garantia_servicio">
        <tr>
            <td class="acciones">
                <button class="btn-editar">✏️</button>
                <button class="btn-eliminar">❌</button>
            </td>
        </tr>
    </template>
