<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teknia</title>
    <!-- Estilos generales del sistema -->
    <link rel="stylesheet" href="estilos.css">
    <!-- Estilos específicos de la página de inicio (bienvenida + estadísticas) -->
    <link rel="stylesheet" href="estilo_inicio.css">
</head>
<body class="cargando-rol">
    <div class="contenedor-grid">

        <!-- ── NAVBAR SUPERIOR ──────────────────────────────────── -->
        <nav class="navbar">
            <ul>
                <div class="logo">
                    <div class="logo-icon">T</div>
                    <span class="logo-name">Teknia</span>
                </div>
                <li><a href="index.html" class="activo">Inicio</a></li>
                <li data-rol="cliente empleado jefe_sucursal jefe_general">
                    <a href="servicios-crear_oden.html">Servicios</a>
                </li>
                <li data-rol="cliente empleado jefe_sucursal jefe_general">
                    <a href="sucursales-ubicacion.html">Sucursales</a>
                </li>
                <li data-rol="empleado jefe_sucursal jefe_general">
                    <a href="inventario-repuestos.html">Inventario</a>
                </li>
                <li data-rol="jefe_sucursal jefe_general">
                    <a href="finanzas-garantias.html">Finanzas</a>
                </li>
                <li data-rol="empleado jefe_sucursal jefe_general">
                    <a href="personal-clientes.html">Personal</a>
                </li>
                <li data-rol="jefe_general">
                    <a href="administracion-contratos.html">Administración</a>
                </li>
                <li class="nav-auth" id="nav-auth-area">
                    <a href="inicio_sesion.html" class="btn-sesion">Iniciar sesión</a>
                    <a href="crear_cuenta.html" class="btn-cuenta">Crear cuenta</a>
                </li>
            </ul>
        </nav>

        <!-- Columna lateral vacía en el inicio (sin side-navbar) -->
        <div style="grid-area: 2/1/3/2; background: var(--navy2); border-right: 1px solid rgba(255,255,255,0.05);"></div>

        <!-- ── ÁREA DE CONTENIDO PRINCIPAL ──────────────────────── -->
        <!-- inicio-layout: cambia el flex a columna para apilar secciones -->
        <div class="contenedor-padre inicio-layout">

            <!-- Encabezado de bienvenida -->
            <div class="bienvenida">
                <h1>Bienvenido a Teknia, <span id="nombre-usuario">usuario</span></h1>
                <p id="subtitulo-inicio">Aquí vas a encontrar un resumen de tu actividad en el sistema.</p>
            </div>

            <!-- Etiqueta de sección estadísticas (se oculta si no aplica) -->
            <p class="stats-seccion-label" id="label-stats" style="display:none">Tu actividad</p>

            <!-- Grid de tarjetas de estadísticas — se genera dinámicamente desde estadisticas.js -->
            <div class="stats-grid" id="stats-grid"></div>

        </div>

    </div>

    <!-- tablas.js: sesión, roles y utilidades compartidas -->
    <script src="tablas.js"></script>
    <!-- estadisticas.js: carga y renderiza las estadísticas según el rol -->
    <script src="estadisticas.js"></script>
</body>
</html>
