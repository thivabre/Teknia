<div class="contenedor-padre">
<div class="contenedor-tablas">
  <div class="form-insert" id="form-nueva-orden">
    <h2>Crear orden de servicio</h2>
    <div class="campo-ingreso">
      <div class="campo" id="campo-cliente-id" style="display:none">
        <label>ID del cliente</label>
        <input id="input-id-cliente" min="1" placeholder="Ingrese el ID del cliente" type="number"/>
      </div>
      <div class="campo">
        <label>Nombre del artículo</label>
        <input id="input-nombre-art" placeholder="Ej: iPhone 16 Pro Max" type="text"/>
      </div>
      <div class="campo">
        <label>Tipo de artículo</label>
        <input id="input-tipo-art" placeholder="Ej: Celular" type="text"/>
      </div>
      <div class="campo">
        <label>Sucursal</label>
        <select id="sel-sucursal">
          <option value="">Cargando sucursales…</option>
        </select>
      </div>
      <div class="campo">
        <label>Repuesto 1 (requerido)</label>
        <select id="sel-repuesto-1">
          <option value="">Cargando repuestos…</option>
        </select>
        <div id="info-rep-1" style="font-size:11px;color:var(--t3);margin-top:4px;min-height:16px"></div>
      </div>
      <div class="campo">
        <label>Repuesto 2</label>
        <select id="sel-repuesto-2">
          <option value="0">Ninguno</option>
        </select>
        <div id="info-rep-2" style="font-size:11px;color:var(--t3);margin-top:4px;min-height:16px"></div>
      </div>
      <div class="campo">
        <label>Repuesto 3</label>
        <select id="sel-repuesto-3">
          <option value="0">Ninguno</option>
        </select>
        <div id="info-rep-3" style="font-size:11px;color:var(--t3);margin-top:4px;min-height:16px"></div>
      </div>
      <div class="campo" style="flex: 1 1 100%">
        <label>Fallas / descripción</label>
        <textarea id="input-fallas" placeholder="Describa las fallas del artículo…" rows="3" style="width:100%;padding:8px;border:1px solid var(--bdr);border-radius:7px;font-size:12px;resize:vertical"></textarea>
      </div>
    </div>
    <div id="msg-orden" style="font-size:12px;margin-top:10px;padding:8px 12px;border-radius:7px;display:none"></div>
    <button class="envio-insert" id="btn-crear-orden" style="margin-top:16px" type="button">Crear orden</button>
  </div>
</div>
</div>
