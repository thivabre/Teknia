<div class="contenedor-padre">
<div class="contenedor-tablas">
  <div class="form-insert" id="form-crear-sucursal">
    <h2>Crear nueva sucursal</h2>
    <div class="campo-ingreso">

      <div class="campo">
        <label>País</label>
        <input id="suc-pais" placeholder="Argentina" type="text"/>
      </div>
      <div class="campo">
        <label>Provincia</label>
        <input id="suc-provincia" placeholder="C.A.B.A" type="text"/>
      </div>
      <div class="campo">
        <label>Ciudad</label>
        <input id="suc-ciudad" placeholder="C.A.B.A" type="text"/>
      </div>
      <div class="campo">
        <label>Barrio</label>
        <input id="suc-barrio" placeholder="Saavedra" type="text"/>
      </div>
      <div class="campo">
        <label>Calle</label>
        <input id="suc-calle" placeholder="Av. Nuñez" type="text"/>
      </div>
      <div class="campo">
        <label>Altura</label>
        <input id="suc-altura" min="1" placeholder="2520" type="number"/>
      </div>
      <div class="campo">
        <label>Código postal</label>
        <input id="suc-cod-postal" min="1" placeholder="1430" type="number"/>
      </div>
      <div class="campo">
        <label>Tipo de impuesto</label>
        <select id="sel-tipo-imp">
          <option value="">Cargando impuestos…</option>
        </select>
      </div>

    </div><!-- /campo-ingreso -->
    <div id="msg-sucursal" style="font-size:12px;margin-top:10px;padding:8px 12px;border-radius:7px;display:none"></div>
    <button class="envio-insert" id="btn-crear-sucursal" style="margin-top:16px" type="button">Crear sucursal</button>
  </div>
</div>
</div><!-- /contenedor-padre -->
