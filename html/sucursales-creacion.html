    <div class="contenedor-padre">

        <div class="contenedor-tablas">
            <form class="form-insert">
            <h2>Crear ubicacion de sucursal</h2>
            <div class="campo-ingreso">
                <div class="campo">
                    <label>Pais</label>
                    <input type="text" placeholder="Argentina">
                </div>
                <div class="campo">
                    <label>Provincia</label>
                    <input type="text" placeholder="C.A.B.A">
                </div>
                <div class="campo">
                    <label>Ciudad</label>
                    <input type="text" placeholder="C.A.B.A">
                </div>
                <div class="campo">
                    <label>Barrio</label>
                    <input type="text" placeholder="Saavedra">
                </div>
                <div class="campo">
                    <label>Calle</label>
                    <input type="text" placeholder="Nuñez">
                </div>
                <div class="campo">
                    <label>Altura</label>
                    <input type="text" placeholder="2520">
                </div>
                <div class="campo">
                    <label>Codigo postal</label>
                    <input type="text" placeholder="1430">
                </div>
                <div class="campo">
                    <label>Impuesto aplicado</label>
                    <select>
                        <option value="none">Ninguno</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="envio-insert">Insertar</button>
            </form>
        </div>
