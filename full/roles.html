<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teknia - crear cuenta</title>
    <link rel="stylesheet" href="estilo_roles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <form class="formulario" action="index.html" method="get">
        <h2>Seleccione su tipo de usuario</h2>
        <div class="campo">
            <label for="nombre">Cliente:</label>
            <input type="radio" id="cliente" name="cliente" checked required>
        </div>
        <div class="campo">
            <label for="nombre">Empleado:</label>
            <input type="radio" id="empleado" name="cliente" required>
        </div>
        <div class="campo">
            <label for="nombre">Jefe de sucursal:</label>
            <input type="radio" id="jefe" name="cliente" required>
        </div>
        <button type="submit" class="iniciar">Siguiente</button>
    </form>
</body>
</html>
